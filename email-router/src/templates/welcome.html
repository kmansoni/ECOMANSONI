<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добро пожаловать в Mansoni!</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin:0 auto;">

          <!-- Header / Logo -->
          <tr>
            <td align="center" style="padding:0 0 24px 0;">
              <a href="https://mansoni.ru" style="text-decoration:none;">
                <span style="font-size:28px;font-weight:800;color:#6C5CE7;letter-spacing:-0.5px;">Mansoni</span>
              </a>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#ffffff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;">

              <!-- Hero gradient -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#6C5CE7 0%,#a29bfe 50%,#fd79a8 100%);padding:40px 40px 36px 40px;text-align:center;">
                    <p style="margin:0 0 12px 0;font-size:44px;line-height:1;">🎉</p>
                    <h1 style="margin:0;font-size:26px;font-weight:800;color:#ffffff;line-height:1.3;">Добро пожаловать,<br>{{name}}!</h1>
                  </td>
                </tr>
              </table>

              <!-- Body -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:36px 40px 40px 40px;">

                    <p style="margin:0 0 24px 0;font-size:15px;color:#2d3436;line-height:1.7;text-align:center;">
                      Твой аккаунт успешно создан. Добро пожаловать в платформу, где общение выходит на новый уровень.
                    </p>

                    <!-- Feature list -->
                    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom:32px;">
                      <tr>
                        <td style="background-color:#f8f7ff;border-radius:12px;padding:20px 24px;">
                          <table role="presentation" cellpadding="0" cellspacing="8" width="100%">
                            <tr>
                              <td style="padding:6px 0;">
                                <span style="font-size:18px;">💬</span>
                                <span style="font-size:14px;color:#2d3436;margin-left:10px;font-weight:500;">Зашифрованные сообщения</span>
                              </td>
                            </tr>
                            <tr>
                              <td style="padding:6px 0;">
                                <span style="font-size:18px;">📹</span>
                                <span style="font-size:14px;color:#2d3436;margin-left:10px;font-weight:500;">Видео и аудио звонки</span>
                              </td>
                            </tr>
                            <tr>
                              <td style="padding:6px 0;">
                                <span style="font-size:18px;">🔐</span>
                                <span style="font-size:14px;color:#2d3436;margin-left:10px;font-weight:500;">Полная конфиденциальность</span>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- CTA -->
                    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <td align="center">
                          <a href="https://mansoni.ru"
                             style="display:inline-block;background:linear-gradient(135deg,#6C5CE7 0%,#a29bfe 100%);color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:50px;letter-spacing:0.3px;">
                            Открыть Mansoni
                          </a>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:24px 0 8px 0;">
              <p style="margin:0;font-size:12px;color:#b2bec3;">
                © 2026 Mansoni · <a href="https://mansoni.ru/privacy" style="color:#b2bec3;text-decoration:underline;">Конфиденциальность</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>

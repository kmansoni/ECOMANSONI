<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Уведомление — Mansoni</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin:0 auto;">

          <!-- Header / Logo -->
          <tr>
            <td align="center" style="padding:0 0 24px 0;">
              <a href="https://mansoni.ru" style="text-decoration:none;">
                <span style="font-size:28px;font-weight:800;color:#6C5CE7;letter-spacing:-0.5px;">Mansoni</span>
              </a>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#ffffff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;">

              <!-- Top accent bar -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background:linear-gradient(135deg,#6C5CE7 0%,#a29bfe 100%);height:6px;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>

              <!-- Body -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:40px 40px 32px 40px;">

                    <!-- Icon -->
                    <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 24px auto;">
                      <tr>
                        <td style="background-color:#ede9fd;border-radius:50%;width:56px;height:56px;text-align:center;vertical-align:middle;">
                          <span style="font-size:26px;line-height:56px;">🔔</span>
                        </td>
                      </tr>
                    </table>

                    <h1 style="margin:0 0 16px 0;font-size:21px;font-weight:700;color:#2d3436;text-align:center;">{{title}}</h1>

                    <p style="margin:0 0 28px 0;font-size:15px;color:#636e72;text-align:center;line-height:1.7;">
                      {{body}}
                    </p>

                    <!-- CTA Button (only rendered when action_url is provided) -->
                    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <td align="center">
                          <a href="{{url:action_url}}"
                             style="display:inline-block;background:linear-gradient(135deg,#6C5CE7 0%,#a29bfe 100%);color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:13px 36px;border-radius:50px;letter-spacing:0.3px;">
                            {{action_text}}
                          </a>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:24px 0 8px 0;">
              <p style="margin:0;font-size:12px;color:#b2bec3;">
                © 2026 Mansoni · <a href="https://mansoni.ru/privacy" style="color:#b2bec3;text-decoration:underline;">Конфиденциальность</a>
                · <a href="https://mansoni.ru/unsubscribe" style="color:#b2bec3;text-decoration:underline;">Отписаться</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>

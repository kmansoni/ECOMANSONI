version: "3.9"

services:
  email-router:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: email-router
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      EMAIL_ROUTER_API_KEY: "${EMAIL_ROUTER_API_KEY}"
      EMAIL_ROUTER_PORT: "8090"
      SMTP_HOST: "${SMTP_HOST:-127.0.0.1}"
      SMTP_PORT: "${SMTP_PORT:-25}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_FROM: "${SMTP_FROM:-noreply@mansoni.ru}"
      MAIL_DOMAIN: "${MAIL_DOMAIN:-mansoni.ru}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://mansoni.ru,https://kmansoni.github.io}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - email_queue:/app/data/queue
      - email_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:8090/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m

volumes:
  email_queue:
  email_logs:

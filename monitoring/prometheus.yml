global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: mansoni

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: nginx
    static_configs:
      - targets: ['nginx:9113']

  # Blackbox — проверка доступности HTTP endpoints
  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://mansoni.ru/health
          - https://mansoni.ru/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

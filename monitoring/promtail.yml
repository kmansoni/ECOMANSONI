server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Логи nginx
  - job_name: nginx
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log

  # Логи Docker контейнеров
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

  # Логи PostgreSQL
  - job_name: postgres
    static_configs:
      - targets: [localhost]
        labels:
          job: postgres
          __path__: /var/log/postgresql/*.log

  # Логи приложения (mansoni-app)
  - job_name: mansoni-app
    static_configs:
      - targets: [localhost]
        labels:
          job: mansoni-app
          __path__: /var/log/mansoni/*.log

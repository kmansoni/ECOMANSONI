name: NavigatorApp
options:
  bundleIdPrefix: com.navigator
  deploymentTarget:
    iOS: "17.0"
  xcodeProjectName: NavigatorApp

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  NavigatorApp:
    type: application
    platform: iOS
    sources:
      - path: Apps/NavigatorApp
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Apps/NavigatorApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Apps/NavigatorApp/NavigatorApp.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.navigator.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - package: SQLite.swift
version: '3.8'

services:
  # Supabase Local Development (using docker-compose from Supabase)
  # Note: For full Supabase, use supabase/cli or separate docker-compose
  
  # PostgreSQL (Supabase)
  postgres:
    image: supabase/postgres:latest
    container_name: mansoni-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mansoni
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - mansoni

  # pgvector for embeddings (if using AI features)
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   container_name: mansoni-pgvector
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "54323:5432"
  #   networks:
  #     - mansoni

  # Redis (for caching / sessions)
  redis:
    image: redis:7-alpine
    container_name: mansoni-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mansoni

  # Music API Service
  music-api:
    build:
      context: ./services/music-api
      dockerfile: Dockerfile
    container_name: mansoni-music-api
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: development
      PORT: 3080
      SUPABASE_URL: http://postgres:5432  # Or external URL
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MANSONI_JWT_SECRET: ${MANSONI_JWT_SECRET}
      MANSONI_URL: http://localhost:5173
      MUSIC_FRONTEND_URL: http://localhost:3001
    depends_on:
      - postgres
    volumes:
      - ./services/music-api:/app
      - /app/node_modules
      - /app/dist
    networks:
      - mansoni

  # Music Frontend (Vite dev server)
  music-frontend:
    build:
      context: ./services/music
      dockerfile: Dockerfile
    container_name: mansoni-music-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./services/music:/app
      - /app/node_modules
      - /app/dist
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_API_URL: http://localhost:3080
    networks:
      - mansoni
    depends_on:
      - music-api

  # Main Mansoni App
  mansoni-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mansoni-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    environment:
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_MUSIC_MODULE_URL: http://localhost:3080/modules/music-module.js
      VITE_GODMODE_URL: http://localhost:3077
    networks:
      - mansoni
    depends_on:
      - music-api

  # Nginx Proxy (production)
  nginx:
    image: nginx:alpine
    container_name: mansoni-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - mansoni
    depends_on:
      - mansoni-app
      - music-api
      - music-frontend

  # Let's Encrypt certbot — автообновление каждые 12 часов
  certbot:
    image: certbot/certbot:latest
    container_name: mansoni-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:

networks:
  mansoni:
    driver: bridge

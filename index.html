    <script>
      // GitHub Pages SPA fallback:
      // If the user hits a deep link, Pages serves /404.html which redirects to /?/<path>.
      // This script restores the original path so React Router can handle it.
      (function () {
        var l = window.location;
        if (l.search && l.search.startsWith('?/')) {
          var query = l.search.slice(2);
          
          // Prevent malformed URLs like ?/&/&/&... from infinite loops
          if (query.startsWith('&/&') || query.match(/(&\/){3,}/)) {
            // Corrupted URL - reset to home
            window.history.replaceState(null, '', l.pathname);
            return;
          }
          
          var parts = query.split('&');
          var path = parts.shift() || '';
          var remaining = parts.length ? ('?' + parts.join('&')) : '';
          var base = l.pathname;
          if (!base.endsWith('/')) base = base + '/';
          
          // Use replaceState to update browser history before React Router initializes
          // This ensures the router sees the original path, not the ?/ encoded version
          window.history.replaceState(null, '', base + path + remaining + l.hash);
        }
      })();
    </script>

      <div id="boot-fallback" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#0a1628;color:#fff;font-family:Inter,sans-serif;text-align:center;padding:24px">

    <script>
      // Boot fallback strategy:
      //   1. Show fallback after 250 ms — avoids flash on fast connections.
      //   2. Hide fallback as soon as React mounts (MutationObserver).
      //   3. If React never mounts after 10 s (bundle error / network down),
      //      keep fallback visible so the user can navigate manually.
      (function () {
        var fb = document.getElementById('boot-fallback');
        var root = document.getElementById('root');
        var showTimer = null;
        var hideTimer = null;

        function showFallback() {
          if (fb) fb.style.display = 'flex';
        }

        function hideFallback(obs) {
          if (showTimer) clearTimeout(showTimer);
          if (hideTimer) clearTimeout(hideTimer);
          if (fb) fb.style.display = 'none';
          if (obs) obs.disconnect();
        }

        // Delay showing fallback — on fast connections React mounts before this fires
        showTimer = setTimeout(showFallback, 250);

        // Safety net: if React never mounts in 10 s, show fallback permanently
        hideTimer = setTimeout(showFallback, 10000);

        if (root) {
          var obs = new MutationObserver(function (_, o) {
            // React has mounted when #root has children other than boot-fallback
            if (!document.getElementById('boot-fallback')) {
              hideFallback(o);
            } else if (
              root.children.length > 1 ||
              (root.children[0] && root.children[0].id !== 'boot-fallback')
            ) {
              hideFallback(o);
            }
          });
          obs.observe(root, { childList: true });
        }
      })();
    </script>

    <script>
      // Service Worker registration — sw.js (media cache + push)
      // Never keep SW active in localhost dev: stale shell can block React boot and HMR.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          var isLocalhost =
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1' ||
            window.location.hostname === '[::1]';

          if (isLocalhost) {
            navigator.serviceWorker.getRegistrations()
              .then(function (registrations) {
                registrations.forEach(function (registration) {
                  registration.unregister();
                });
              })
              .catch(function (err) {
                console.warn('[SW] Failed to unregister in localhost:', err);
              });

            if ('caches' in window) {
              caches.keys()
                .then(function (keys) {
                  return Promise.all(keys.map(function (key) { return caches.delete(key); }));
                })
                .catch(function (err) {
                  console.warn('[SW] Failed to clear caches in localhost:', err);
                });
            }
            return;
          }

          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (registration) {
              // Проверяем обновление SW при каждой загрузке страницы
              registration.addEventListener('updatefound', function () {
                var newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function () {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Новая версия SW готова — активируем немедленно
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch(function (err) {
              console.warn('[SW] Registration failed:', err);
            });

          // При смене активного SW — перезагружаем страницу для применения нового кэша
          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>

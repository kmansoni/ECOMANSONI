    <script>
      // GitHub Pages SPA fallback:
      // If the user hits a deep link, Pages serves /404.html which redirects to /?/<path>.
      // This script restores the original path so React Router can handle it.
      (function () {
        var l = window.location;
        if (l.search && l.search.startsWith('?/')) {
          var query = l.search.slice(2);
          
          // Prevent malformed URLs like ?/&/&/&... from infinite loops
          if (query.startsWith('&/&') || query.match(/(&\/){3,}/)) {
            // Corrupted URL - reset to home
            window.history.replaceState(null, '', l.pathname);
            return;
          }
          
          var parts = query.split('&');
          var path = parts.shift() || '';
          var remaining = parts.length ? ('?' + parts.join('&')) : '';
          var base = l.pathname;
          if (!base.endsWith('/')) base = base + '/';
          
          // Use replaceState to update browser history before React Router initializes
          // This ensures the router sees the original path, not the ?/ encoded version
          window.history.replaceState(null, '', base + path + remaining + l.hash);
        }
      })();
    </script>

  <style>
    #boot-fallback {
      min-height: 100vh;

  <body>
    <div id="root">

          <div id="maintenance-notice">
            <p class="mn-title">⚙️ Ведутся технические работы</p>
            <p class="mn-body">Совсем скоро всё заработает. Попробуйте обновить страницу чуть позже.</p>
          </div>
        </div>
      </div>

    <script>
      // Show maintenance notice ONLY if the app fails to load
      (function () {
        function showMaintenance() {
          var fb = document.getElementById('boot-fallback');
          var mn = document.getElementById('maintenance-notice');
          if (fb && mn) mn.style.display = 'block';
        }

        // Case 1: app script load error (network down / 404 / SyntaxError)
        window.addEventListener('error', function (e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            showMaintenance();
          }
        }, true);

        // Case 2: React never mounts after 10 s (server down, JS crash before mount)
        var _bootTimeout = setTimeout(function () {
          showMaintenance();
        }, 10000);

        // Clear timer as soon as React takes over (boot-fallback removed from DOM)
        var _observer = new MutationObserver(function () {
          if (!document.getElementById('boot-fallback')) {
            clearTimeout(_bootTimeout);
            _observer.disconnect();
          }
        });
        var root = document.getElementById('root');
        if (root) _observer.observe(root, { childList: true, subtree: false });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

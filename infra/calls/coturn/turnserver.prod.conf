# coturn production config — mansoni.ru TURN server
#
# Authentication model: RFC 5766 §9.2 REST API / HMAC-SHA1 shared secret.
# The shared secret MUST match the TURN_SHARED_SECRET env var in Edge Function `turn-credentials`.
#
# Deploy checklist:
#   1. Replace REPLACE_WITH_PUBLIC_IP with the VPS public IP (not NAT'd)
#   2. Set static-auth-secret to the same value as TURN_AUTH_SECRET in Supabase Vault
#   3. Obtain TLS cert: certbot certonly --standalone -d turn.mansoni.ru
#   4. Set correct permissions: chown -R turnserver:turnserver /etc/letsencrypt/live/turn.mansoni.ru/
#   5. Open firewall: UDP+TCP 3478, TCP 5349, UDP 49160-49200

# ─── Network ────────────────────────────────────────────────────────────────
listening-ip=0.0.0.0
listening-ip=::
listening-port=3478
tls-listening-port=5349

# NAT routing: REQUIRED on VPS/cloud — coturn must know its public IP.
# Set to the public IPv4 of the TURN server node.
# For multi-homed: external-ip=PUBLIC_IP/PRIVATE_IP (auto-detect private via routing table)
external-ip=REPLACE_WITH_PUBLIC_IP

# Multi-region failover hints (optional):
# If this node has healthy regional peers, advertise them as alternates.
# Clients can retry on alternative TURN if allocation fails here.
# alternate-server=turn-tr.mansoni.ru:3478
# alternate-server=turn-ae.mansoni.ru:3478

# ─── Relay port pool ────────────────────────────────────────────────────────
# Keep narrow to reduce attack surface and ease firewall rules.
# 41 relay ports supports up to ~40 concurrent TURN streams.
# Scale up (max-port up to 49500) if serving more than 40 concurrent relayed streams.
min-port=49160
max-port=49200

# ─── Realm & server identity ────────────────────────────────────────────────
realm=mansoni.ru
server-name=turn.mansoni.ru

# ─── RFC 5766 §9.2 HMAC-SHA1 shared-secret auth ────────────────────────────
# Username format from Edge Function: "<expiry_unix>:<user_hash>"
# Credential:                         HMAC-SHA1(static-auth-secret, username)
#
# IMPORTANT: this secret MUST match TURN_SHARED_SECRET set in:
#   supabase/functions/turn-credentials (Supabase Vault → TURN_SHARED_SECRET)
#
# Generate a strong secret: openssl rand -hex 32
use-auth-secret
static-auth-secret=CHANGE_ME_USE_OPENSSL_RAND_HEX_32

# ─── TLS (TURNS — mandatory for corporate networks blocking UDP) ─────────────
# Obtain certificates via Let's Encrypt:
#   certbot certonly --standalone -d turn.mansoni.ru
cert=/etc/letsencrypt/live/turn.mansoni.ru/fullchain.pem
pkey=/etc/letsencrypt/live/turn.mansoni.ru/privkey.pem
# TLS 1.2+ only (coturn default allows TLS 1.0 — explicitly disable legacy)
no-tlsv1
no-tlsv1_1

# ─── Security hardening ──────────────────────────────────────────────────────
# Prevent TURN relay from being used to probe private/link-local addresses (SSRF via TURN)
no-loopback-peers
no-multicast-peers

# Block RFC 1918 private ranges as TURN relay destinations.
# This prevents the TURN server from being used to pivot into internal networks.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Add DTLS fingerprint to prevent TURN relay from being used to downgrade to cleartext
fingerprint

# Keep relay transports compatible with heterogeneous client networks.
# Do not force-disable TCP relay unless you validated enterprise/firewall scenarios.

# Reject allocations that specify neither username nor credential
# (defence-in-depth: use-auth-secret already enforces auth)
lt-cred-mech

# ─── Performance ─────────────────────────────────────────────────────────────
# Use separate process per CPU core (coturn multi-process mode)
# Automatically detected; set explicitly if needed: proc-user=turnserver
# Max session allocation per user (DoS protection)
max-allocate-lifetime=3600
channel-lifetime=600
permission-lifetime=300

# ─── Logging ─────────────────────────────────────────────────────────────────
# verbose — structured logs for observability pipeline ingestion
# Remove verbose in production if log volume is too high (use syslog instead)
verbose
log-file=/var/log/coturn/turnserver.log
# Rotate logs daily (use logrotate; coturn also supports SIGUSR1 for rotation)

# Prometheus/system monitoring should scrape:
# - process CPU/memory
# - UDP/TCP relay bandwidth
# - active allocations/channels (from coturn logs + exporter)

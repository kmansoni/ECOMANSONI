services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  calls-ws:
    # Mansoni Calls WS Gateway — signaling + room coordination
    # Build: docker build -t mansoni-calls-ws -f server/calls-ws/Dockerfile .
    build:
      context: ../..
      dockerfile: server/calls-ws/Dockerfile
    image: mansoni-calls-ws:latest
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - ENV=production
      - CALLS_WS_PORT=8787
      - REDIS_URL=redis://redis:6379
      - CALLS_WS_TRUSTED_PROXIES=${CALLS_WS_TRUSTED_PROXIES:-127.0.0.1}
    env_file:
      - ../../.env.production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8787/health 2>/dev/null | grep -q '\"ok\"' || wget -qO- http://localhost:8787/ 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./coturn/turnserver.prod.conf:/etc/coturn/turnserver.conf:ro
      # Mount host Let's Encrypt certs into the container (read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    command: ["-c", "/etc/coturn/turnserver.conf", "-n", "--log-file=stdout"]
  sfu:
    # mediasoup SFU — production SFU-only mode
    # Build: docker build -t mansoni-sfu ./server/sfu
    image: mansoni-sfu:latest
    restart: unless-stopped
    ports:
      - "4443:4443"
      - "40000-49999:40000-49999/udp"
    environment:
      - SFU_ENABLE_MEDIASOUP=1
      - SFU_REQUIRE_MEDIASOUP=1
      - SFU_REQUIRE_SFRAME=1
      - SFU_REQUIRE_SECURE_WS=1
      - SFU_E2EE_REQUIRED=1
      - E2EE_REQUIRED_DEFAULT=true
      - SFU_STRICT_VALIDATION=1
      - SFU_INSECURE_DEV_MODE=0
      - SFU_TRUSTED_PROXIES=${SFU_TRUSTED_PROXIES:-127.0.0.1}
      - SFU_KEY_PACKAGE_RATE=50
      - SFU_REKEY_BEGIN_RATE=5
      - SFU_WORKER_COUNT=auto
      - SFU_MAX_ROOMS_PER_WORKER=100
      - PORT=4443
      - REGION=primary
    env_file:
      - ../../server/sfu/.env.production

volumes:
  redis-data:

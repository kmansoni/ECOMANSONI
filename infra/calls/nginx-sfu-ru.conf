# Mansoni SFU — nginx reverse proxy (WSS termination)
# Region: RU | Domain: sfu-ru.mansoni.ru → ws://127.0.0.1:4443
#
# Install:
#   cp infra/calls/nginx-sfu-ru.conf /etc/nginx/sites-available/sfu-ru.mansoni.ru
#   ln -s /etc/nginx/sites-available/sfu-ru.mansoni.ru /etc/nginx/sites-enabled/
#   certbot --nginx -d sfu-ru.mansoni.ru   # or use wildcard: *.mansoni.ru
#   nginx -t && systemctl reload nginx

upstream sfu_ru_backend {
    server 127.0.0.1:4443;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sfu-ru.mansoni.ru;
    return 301 https://$server_name$request_uri;
}

# HTTPS + WSS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sfu-ru.mansoni.ru;
    http2 on;

    # --- TLS (certbot will fill these in) ---
    # ssl_certificate     /etc/letsencrypt/live/mansoni.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mansoni.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (enable after TLS confirmed working)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # --- WebSocket upgrade for /ws ---
    location /ws {
        proxy_pass http://sfu_ru_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time traffic
        proxy_buffering off;
        proxy_cache     off;
    }

    # --- Health check passthrough ---
    location /health {
        proxy_pass http://sfu_ru_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
}

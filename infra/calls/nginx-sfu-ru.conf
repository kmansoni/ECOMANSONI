# Mansoni SFU — nginx reverse proxy (WSS termination)
# /ws  → SFU (4443) WebSocket signaling + mediasoup media transport
# /health → SFU (4443) health check
#
# Install:
#   cp infra/calls/nginx-sfu-ru.conf /etc/nginx/sites-enabled/sfu.mansoni.ru
#   nginx -t && systemctl reload nginx

upstream sfu_ru_backend {
    server 127.0.0.1:4443;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sfu-ru.mansoni.ru sfu-tr.mansoni.ru sfu-ae.mansoni.ru;
    return 301 https://$host$request_uri;
}

# HTTPS + WSS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sfu-ru.mansoni.ru sfu-tr.mansoni.ru sfu-ae.mansoni.ru;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/sfu-mansoni-ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sfu-mansoni-ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- WebSocket signaling + mediasoup media transport ---
    location /ws {
        proxy_pass http://sfu_ru_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }

    # --- Health check ---
    location /health {
        proxy_pass http://sfu_ru_backend/health;
        proxy_set_header Host $host;
    }

    # Block everything else
    location / {
        return 404;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
}

# OpenDMARC configuration

AuthservID        mail.mansoni.ru
Socket            inet:8893@0.0.0.0
UMask             007

# DMARC verification
RejectFailures    false
SPFSelfValidate   true
SPFIgnoreResults  false

# Logging
Syslog            true
SyslogFacility    mail

# History
HistoryFile       /var/run/opendmarc/opendmarc.dat

# Failure reports (aggregate)
FailureReports    false

# Trusted AuthServ IDs
TrustedAuthservIDs mail.mansoni.ru

# Ignore AuthResults from these hosts
IgnoreHosts       /etc/opendmarc/ignore.hosts
IgnoreMailFrom    mansoni.ru

# Soft-fail mode (log only, don't reject)
# Раскомментировать после тестирования:
# RejectFailures true

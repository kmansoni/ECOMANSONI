groups:
  - name: email-platform-alerts
    rules:
      - alert: EmailRouterDown
        expr: up{job="email-router"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Email router is down"
          description: "Email router has been down for more than 1 minute"

      - alert: HighBounceRate
        expr: rate(email_router_bounces_processed_total{bounce_type="hard"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High hard bounce rate"
          description: "Hard bounce rate exceeds 5% over 5 minutes"

      - alert: QueueBacklog
        expr: sum(email_router_queue_waiting{queue="send"}) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Email send queue backlog"
          description: "More than 1000 emails waiting in send queue"

      - alert: CircuitBreakerOpen
        expr: email_router_circuit_breaker_state{state="OPEN"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SMTP circuit breaker is OPEN"
          description: "Circuit breaker to SMTP relay has tripped"

      - alert: HighSendLatency
        expr: histogram_quantile(0.95, rate(email_router_send_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High email send latency"
          description: "P95 email send latency exceeds 10 seconds"

      - alert: SMTPConnectionPoolExhausted
        expr: email_router_smtp_connections_active > 8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "SMTP connection pool near exhaustion"

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"

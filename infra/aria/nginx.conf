# Nginx config for ARIA server
# Include from /etc/nginx/sites-available/aria.mansoni.ru
# ln -s /etc/nginx/sites-available/aria.mansoni.ru /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name aria.mansoni.ru;

    ssl_certificate     /etc/letsencrypt/live/aria.mansoni.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aria.mansoni.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE: disable buffering for streaming
    proxy_buffering        off;
    proxy_cache            off;
    proxy_read_timeout     120s;
    proxy_connect_timeout  5s;

    location / {
        proxy_pass         http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (text/event-stream)
        proxy_set_header   Connection        "";
        chunked_transfer_encoding on;
    }

    location /health {
        proxy_pass http://127.0.0.1:7860/health;
        access_log off;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name aria.mansoni.ru;
    return 301 https://$host$request_uri;
}

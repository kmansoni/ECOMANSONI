# =============================================================================
# ECOMANSONI Livestream — Nginx Reverse Proxy + HLS Cache
# Version: nginx 1.25-alpine
#
# Routing table:
#   /            → health + static
#   /api/        → livestream-gateway:3100 (REST)
#   /ws/         → livekit-server:7880 (WebSocket signalling, upgrade handled)
#   /whip/       → livekit-ingress:8088 (WHIP WebRTC ingest)
#   /hls/        → minio:9000 (HLS streaming proxy with disk caching)
#   /recordings/ → returns 403 (recordings served via presigned URLs only)
#
# Security measures:
#   - Rate limiting zones per IP (DDoS mitigation)
#   - CORS headers for browser clients (restrict origins in prod)
#   - No server tokens (hide nginx version)
#   - X-Content-Type-Options, X-Frame-Options headers
#   - Recordings bucket never proxied (403 always)
#
# TLS: Placeholder commented section — uncomment and supply cert path in prod.
#      In production use certbot/acme or terminate TLS at cloud LB.
# =============================================================================

# Worker count: auto = number of CPU cores on host
worker_processes auto;

# Maximum open file descriptors per worker.
# 10M users → large number of concurrent connections.
# Tune: ulimit -n on host must be >= worker_rlimit_nofile.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  # Maximum simultaneous connections per worker.
  # Total = worker_processes × worker_connections.
  worker_connections 8192;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Structured JSON log for log aggregation (ELK / Loki)
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"http_referer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"request_id":"$request_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  # Performance
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/x-mpegurl video/mp2t;
  gzip_min_length 1024;

  # Security: hide nginx version
  server_tokens off;

  # Request ID for distributed tracing
  add_header X-Request-ID $request_id always;

  # ==========================================================================
  # Rate Limiting Zones
  # Stored in shared memory; key = $binary_remote_addr (4 bytes/IPv4, 16/IPv6)
  # api_limit:    10 req/s per IP — covers REST API calls
  # ws_limit:     5 connections/s per IP — WebSocket upgrade rate
  # hls_limit:    100 req/s per IP — HLS segment fetch (many concurrent segs)
  # ==========================================================================
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=10r/s;
  limit_req_zone $binary_remote_addr zone=ws_limit:1m      rate=5r/s;
  limit_req_zone $binary_remote_addr zone=hls_limit:10m    rate=100r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ==========================================================================
  # HLS Proxy Cache
  # Caches .ts segments from MinIO on local disk to reduce MinIO load.
  # levels=1:2 — two-level directory hash (16 × 256 = 4096 dirs per cache)
  # keys_zone: 64MB shared memory for cache keys (1MB ≈ 8000 keys)
  # max_size: 10GB disk; inactive: evict after 5min if not accessed
  # use_temp_path: off — write directly to cache dir (avoids extra copy)
  # ==========================================================================
  proxy_cache_path /var/cache/nginx/hls
    levels=1:2
    keys_zone=hls_cache:64m
    max_size=10g
    inactive=5m
    use_temp_path=off;

  # ==========================================================================
  # Upstreams
  # keepalive: persistent connections to upstreams (reduce TCP handshake cost)
  # ==========================================================================
  upstream gateway {
    server livestream-gateway:3100;
    keepalive 32;
  }

  upstream livekit {
    server livekit-server:7880;
    keepalive 32;
  }

  upstream livekit_ingress {
    server livekit-ingress:8088;
    keepalive 16;
  }

  upstream minio {
    server minio:9000;
    keepalive 64;
  }

  # ==========================================================================
  # HTTP Server — port 80
  # In production: add SSL server block on port 443 and redirect 80→443.
  # ==========================================================================
  server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Global security headers
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header X-XSS-Protection        "1; mode=block"   always;

    # ------------------------------------------------------------------
    # CORS — allow browser clients from your domain.
    # Replace yourdomain.com with actual origin in production.
    # $http_origin matching prevents open CORS (any origin).
    # ------------------------------------------------------------------
    set $cors_origin "";
    if ($http_origin ~* "^https?://(localhost|.*\.yourdomain\.com)(:\d+)?$") {
      set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin      "$cors_origin"                                always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS, PATCH"      always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID"   always;
    add_header Access-Control-Allow-Credentials "true"                                        always;
    add_header Access-Control-Max-Age           "86400"                                       always;

    # Preflight fast-path — return 204 immediately
    if ($request_method = OPTIONS) {
      return 204;
    }

    # Connection limit per IP
    limit_conn conn_limit 100;

    # ------------------------------------------------------------------
    # Health probe — used by Docker healthcheck and load balancers
    # ------------------------------------------------------------------
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # Gateway REST API
    # Rate: 10 req/s burst 20 — allows short bursts (stream join storm)
    # timeout values: upstream should respond within 30s
    # ------------------------------------------------------------------
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;

      proxy_connect_timeout  5s;
      proxy_send_timeout     30s;
      proxy_read_timeout     30s;

      proxy_buffer_size          16k;
      proxy_buffers              4 16k;
      proxy_busy_buffers_size    32k;
    }

    # ------------------------------------------------------------------
    # LiveKit WebSocket signalling
    # Clients connect here to join rooms and receive/publish tracks.
    # WebSocket upgrade headers required.
    # No rate limit zone: LiveKit SDK handles reconnect backoff.
    # Timeout: 1h — WebSocket connections are long-lived during streams.
    # ------------------------------------------------------------------
    location /ws/ {
      limit_req zone=ws_limit burst=10 nodelay;

      proxy_pass         http://livekit;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      proxy_connect_timeout  10s;
      proxy_send_timeout     3600s;
      proxy_read_timeout     3600s;
    }

    # LiveKit HTTP API (room management via gateway — not exposed directly)
    # Uncomment ONLY for internal admin access; never expose to WAN.
    # location /livekit-api/ {
    #   deny all;
    # }

    # ------------------------------------------------------------------
    # WHIP ingest endpoint — browser-based WebRTC publish
    # Proxied to livekit-ingress:8088.
    # POST /whip/{room_name} with SDP offer body.
    # Rate: 5 req/s (new stream starts only; not media traffic)
    # ------------------------------------------------------------------
    location /whip/ {
      limit_req zone=api_limit burst=5 nodelay;

      proxy_pass         http://livekit_ingress;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

      proxy_connect_timeout  5s;
      proxy_send_timeout     30s;
      proxy_read_timeout     30s;
    }

    # ------------------------------------------------------------------
    # HLS streaming proxy (CDN fallback path)
    # Proxies MinIO /livestream-hls/ bucket with local disk cache.
    # Cache key: full URI (includes session_id in path → no cross-session hits)
    # .m3u8 playlists: cache 2s only (updated every segment)
    # .ts segments: cache 1h (immutable once written)
    # Stale-while-revalidate: serve stale for 1s while fetching fresh (reduces
    #   client-visible latency on MinIO hiccup).
    # ------------------------------------------------------------------
    location /hls/ {
      limit_req zone=hls_limit burst=200 nodelay;

      # Rewrite /hls/{session_id}/... → /livestream-hls/{session_id}/...
      rewrite ^/hls/(.*)$ /livestream-hls/$1 break;

      proxy_pass         http://minio;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              minio:9000;

      # Cache configuration
      proxy_cache            hls_cache;
      proxy_cache_key        "$scheme$request_method$host$request_uri";
      proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
      proxy_cache_lock       on;
      proxy_cache_lock_timeout 5s;

      # Playlist refresh: cache 2s max (segments are 2s, playlist updates constantly)
      proxy_cache_valid 200 2s;

      # Override for .ts segments — immutable, cache 1h
      location ~* \.ts$ {
        proxy_pass         http://minio;
        proxy_cache            hls_cache;
        proxy_cache_key        "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale  error timeout;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control  "public, max-age=3600" always;
      }

      # CORS for HLS (players on different origins)
      add_header Access-Control-Allow-Origin  "*" always;
      add_header X-Cache-Status               $upstream_cache_status always;
      # Playlists must not be cached aggressively by browser
      add_header Cache-Control "no-cache" always;

      proxy_connect_timeout  5s;
      proxy_send_timeout     60s;
      proxy_read_timeout     60s;
    }

    # ------------------------------------------------------------------
    # Recordings — ALWAYS 403. Recordings are served via gateway-issued
    # presigned MinIO URLs (time-limited, HMAC-signed, one-time).
    # Direct access bypasses all auth checks — must never be allowed.
    # ------------------------------------------------------------------
    location /recordings/ {
      return 403 "Access denied. Use presigned URL from /api/v1/recordings/:id/url";
    }

    # ------------------------------------------------------------------
    # Block MinIO console from external access (port 9001 is internal).
    # If nginx is your only public entry point, ensure 9001 is not exposed
    # in docker-compose ports mapping on the host.
    # ------------------------------------------------------------------
    location /minio/ {
      return 404;
    }

    # Catch-all — return 404 for anything not explicitly routed
    location / {
      return 404;
    }
  }

  # ==========================================================================
  # SSL/TLS Server Block (Production)
  # Uncomment and configure in production. Replace cert paths.
  # Pair with: certbot --nginx or mount cert from Let's Encrypt / ACME.
  # ==========================================================================
  # server {
  #   listen 443 ssl http2;
  #   server_name live.yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
  #   ssl_prefer_server_ciphers on;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 1d;
  #   ssl_stapling        on;
  #   ssl_stapling_verify on;
  #
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  #
  #   # ... same location blocks as HTTP server above ...
  # }
  #
  # server {
  #   listen 80;
  #   server_name live.yourdomain.com;
  #   return 301 https://$host$request_uri;
  # }
}

# ============================================================
# CORS Configuration — media.mansoni.ru
# Allowlist: mansoni.ru origins + local dev ports
# This file is included inside server{} blocks via:
#   include /etc/nginx/conf.d/cors.conf;
# ============================================================

# Allowlist check — empty string means "not allowed"
set $cors_origin "";
if ($http_origin ~* "^https?://(localhost:(5173|5174)|mansoni\.ru|www\.mansoni\.ru|app\.mansoni\.ru)$") {
    set $cors_origin $http_origin;
}

# Preflight — return 204 immediately, no proxying needed
if ($request_method = OPTIONS) {
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Client-Info, X-Requested-With" always;
    add_header Access-Control-Max-Age       86400 always;
    add_header Vary                         Origin always;
    add_header Content-Length 0;
    return 204;
}

# Actual request headers
add_header Access-Control-Allow-Origin  $cors_origin always;
add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Client-Info, X-Requested-With" always;
add_header Access-Control-Max-Age       86400 always;
add_header Vary                         Origin always;

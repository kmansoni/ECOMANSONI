# ============================================================
# Nginx — media.mansoni.ru
# TLS termination, reverse proxy, CDN caching, rate limiting
#
# Architecture:
#   GET  /                  → MinIO :9000  (public CDN reads)
#   POST /api/upload        → media-api :3100  (auth required)
#   GET  /api/health        → media-api :3100  (healthcheck)
#   GET  /nginx-health      → stub (Docker healthcheck)
# ============================================================

# Rate limiting zones — defined at http{} level via main nginx.conf
# Using limit_req_zone here as a snippet for completeness:
#   limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=read_limit:20m   rate=300r/m;
# They must be placed in http{} — add them to /etc/nginx/nginx.conf
# or a separate snippet included in http{} context.

# ----------------------------------------------------------
# HTTP → HTTPS redirect
# ----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name media.mansoni.ru;

    # Let's Encrypt HTTP-01 challenge — must remain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS — main server block
# ----------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.mansoni.ru;

    # TLS — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/media.mansoni.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.mansoni.ru/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security hardening headers
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "DENY"             always;
    add_header Referrer-Policy         "strict-origin"    always;

    # Upload limits — must accommodate largest video (500 MB)
    client_max_body_size 512m;

    # Gzip off — media files are already compressed (JPEG, MP4, WebM, WebP)
    gzip off;

    # Proxy read/send timeouts for large uploads
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 10s;
    proxy_buffering       off;  # required for streaming uploads

    # Proxy headers passed upstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ----------------------------------------------------------
    # Docker / internal healthcheck endpoint
    # ----------------------------------------------------------
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ----------------------------------------------------------
    # Upload API — authenticated writes → media-api
    # Rate limited: 10 uploads/min per IP
    # Authorization header is mandatory (enforced in media-api)
    # ----------------------------------------------------------
    location /api/upload {
        # Rate limiting — burst 5 with nodelay to reject immediately after burst
        limit_req zone=upload_limit burst=5 nodelay;
        limit_req_status 429;

        # Require Authorization header — early rejection saves resources
        if ($http_authorization = "") {
            return 401 '{"error":"Authorization header required"}';
        }

        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://media-api:3100;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Extended timeout for synchronous HLS transcoding.
        # A 5-minute video at 1080p takes up to 5 minutes to transcode.
        # Default global value (600s) is kept as ceiling; explicit here for clarity.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----------------------------------------------------------
    # Health endpoint — media-api
    # No auth, no rate limit, used by monitoring / load balancers
    # ----------------------------------------------------------
    location /api/health {
        access_log off;
        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://media-api:3100;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ----------------------------------------------------------
    # All other /api/* routes → media-api
    # ----------------------------------------------------------
    location /api/ {
        limit_req zone=read_limit burst=50 nodelay;
        limit_req_status 429;

        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://media-api:3100;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ----------------------------------------------------------
    # HLS MIME types (must be declared in http{} context in nginx.conf,
    # or included via an http-level conf.d snippet):
    #
    #   types {
    #     application/vnd.apple.mpegurl  m3u8;
    #     video/mp2t                     ts;
    #   }
    #
    # The Content-Type is also set on every MinIO object at upload time
    # (application/vnd.apple.mpegurl for .m3u8, video/mp2t for .ts), so
    # Safari / HLS.js receive the correct Content-Type even without the
    # nginx types override.  The types{} block in http{} is belt-and-suspenders
    # for any static-file serving fallback.
    # ----------------------------------------------------------

    # ----------------------------------------------------------
    # HLS master and variant playlists (.m3u8)
    # Short cache (1 hour): playlists reference segment filenames that do
    # not change, but clients must be able to discover new variants.
    # IMPORTANT: Do NOT mark playlists as immutable — they may be re-generated
    # if the upload pipeline reruns (e.g. quality ladder expansion).
    # ----------------------------------------------------------
    location ~* /hls/.*\.m3u8$ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        limit_req zone=read_limit burst=200 nodelay;
        limit_req_status 429;

        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host minio:9000;
        proxy_set_header   Authorization "";

        proxy_cache        media_cache;
        proxy_cache_valid  200 1h;
        proxy_cache_valid  404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock   on;
        add_header         X-Cache-Status $upstream_cache_status always;

        # 1 hour cache — allows CDN to invalidate playlists on re-transcode
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ----------------------------------------------------------
    # HLS transport-stream segments (.ts)
    # Immutable by construction: segment filenames include monotonic index
    # (seg_000.ts … seg_NNN.ts).  Once written to MinIO they never change.
    # 1-year immutable cache is safe and desirable.
    # ----------------------------------------------------------
    location ~* /hls/.*\.ts$ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        limit_req zone=read_limit burst=200 nodelay;
        limit_req_status 429;

        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host minio:9000;
        proxy_set_header   Authorization "";

        proxy_cache        media_cache;
        proxy_cache_valid  200 304 1y;
        proxy_cache_valid  404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock   on;
        add_header         X-Cache-Status $upstream_cache_status always;

        # Immutable — segments are content-addressed and never overwritten
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ----------------------------------------------------------
    # CDN reads — GET media objects from MinIO
    # Public read-only; no auth forwarded to MinIO
    # Cache: 1 year immutable for content-addressed objects
    # ----------------------------------------------------------
    location / {
        # Only allow safe read methods on this path
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        limit_req zone=read_limit burst=200 nodelay;
        limit_req_status 429;

        include /etc/nginx/conf.d/cors.conf;

        proxy_pass         http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host minio:9000;
        # Strip auth headers — MinIO objects are public-read
        proxy_set_header   Authorization "";

        # Nginx proxy cache — reduce MinIO load for hot objects
        proxy_cache        media_cache;
        proxy_cache_valid  200 304 1y;
        proxy_cache_valid  404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock   on;
        add_header         X-Cache-Status $upstream_cache_status always;

        # Immutable cache for content-addressed files (UUID-based names)
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Content-type auto-detection headers
        add_header X-Content-Type-Options "nosniff" always;
    }
}

# ----------------------------------------------------------
# Proxy cache configuration
# Must be declared in http{} context — add to nginx.conf:
#   proxy_cache_path /var/cache/nginx
#       levels=1:2
#       keys_zone=media_cache:100m
#       max_size=20g
#       inactive=7d
#       use_temp_path=off;
#
# And rate limit zones:
#   limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;
#   limit_req_zone $binary_remote_addr zone=read_limit:20m   rate=300r/m;
# ----------------------------------------------------------

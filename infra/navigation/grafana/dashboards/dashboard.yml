apiVersion: 1

# =============================================================================
# Grafana Dashboard Providers — ECOMANSONI Navigation Platform
# Scans /etc/grafana/provisioning/dashboards for JSON dashboard files
# =============================================================================

providers:

  - name: 'navigation-platform'
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true

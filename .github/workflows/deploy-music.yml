name: Deploy Music Module

on:
  push:
    branches: [main, master]
    paths:
      - 'services/music/**'
      - 'scripts/build-modules.mjs'
      - '.github/workflows/deploy-music.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'services/music/**'
      - 'scripts/build-modules.mjs'

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd services/music
          npm ci

      - name: Run typecheck
        run: |
          cd services/music
          npm run typecheck

      - name: Build module
        run: |
          cd services/music
          npm run build

      - name: Upload artifact to S3 (production)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/mansoni-deploy
          aws-region: us-east-1

      - name: Deploy to CDN
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 cp services/music/dist/index.js s3://cdn.mansoni.com/modules/music/music-module.js --content-type "application/javascript" --cache-control "public, max-age=31536000, immutable"
          echo "✅ Deployed music-module.js to CDN"

      - name: Update manifest
        if: github.ref == 'refs/heads/main'
        run: |
          cat > dist/modules/music/manifest.json <<EOF
          {
            "id": "music",
            "name": "Music",
            "version": "1.0.0",
            "size": $(stat -c%s services/music/dist/index.js),
            "url": "https://cdn.mansoni.com/modules/music/music-module.js",
            "entryFile": "music-module.js",
            "entryComponent": "default",
            "checksum": "$(sha256sum services/music/dist/index.js | cut -d' ' -f1)"
          }
          EOF
          aws s3 cp dist/modules/music/manifest.json s3://cdn.mansoni.com/modules/music/manifest.json --content-type "application/json"
          echo "✅ Updated manifest"

      - name: Post to Slack (optional)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: slackapi/slack-github-action@v1.28.0
        with:
          payload: |
            {
              "text": "🎵 Music module deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Music Module Deployed*\n<https://github.com/mansoni/mansoni/actions|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify admin VPS (trigger redeploy)
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.ADMIN_VPS_WEBHOOK_URL }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_VPS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"service": "music", "version": "1.0.0"}'

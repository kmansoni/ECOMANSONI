name: Deploy Calls SFU (RU/TR/AE)

on:
  push:
    branches:
      - main
    paths:
      - server/calls-ws/**
      - infra/calls/**
      - .github/workflows/deploy-calls-sfu.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-calls-sfu
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # RU node
  # ---------------------------------------------------------------------------
  deploy-sfu-ru:
    name: Deploy SFU RU
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & bootstrap calls-ws on RU node
        uses: appleboy/ssh-action@v1.2.0
        env:
          CALLS_JOIN_TOKEN_SECRET: ${{ secrets.CALLS_JOIN_TOKEN_SECRET }}
          CALLS_WS_TRUSTED_PROXIES: ${{ secrets.CALLS_WS_TRUSTED_PROXIES }}
          SFU_TRUSTED_PROXIES: ${{ secrets.SFU_TRUSTED_PROXIES }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          host: ${{ secrets.SFU_RU_HOST }}
          port: ${{ secrets.SFU_RU_SSH_PORT || '22' }}
          username: ${{ secrets.SFU_RU_USER }}
          key: ${{ secrets.SFU_RU_SSH_KEY }}
          envs: CALLS_JOIN_TOKEN_SECRET,CALLS_WS_TRUSTED_PROXIES,SFU_TRUSTED_PROXIES,VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY
          script: |
            set -euo pipefail
            APP_DIR="${CALLS_APP_DIR:-/opt/mansoni/app}"
            COMPOSE_FILE="${CALLS_COMPOSE_FILE:-infra/calls/docker-compose.prod.yml}"
            SERVICE="${CALLS_SERVICE:-calls-ws}"
            REGION="ru"
            LOCK_FILE="${CALLS_DEPLOY_LOCK_FILE:-/tmp/calls-ws-deploy.lock}"
            exec 9>"$LOCK_FILE"
            flock 9

            # -- 1. Sync code to latest main (hard reset, safe in CI) -----------
            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            rm -f .git/index.lock .git/MERGE_HEAD .git/rebase-merge .git/rebase-apply || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            upsert_env_var() {
              local file="$1"
              local key="$2"
              local value="$3"
              touch "$file"
              chmod 600 "$file" || true
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            # -- 1.1 Ensure join-token secret exists in environment ------------
            # Keep secret in .env.production for systemd EnvironmentFile loading.
            if [ -n "${CALLS_JOIN_TOKEN_SECRET:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              touch "$ENV_FILE"
              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_JOIN_TOKEN_SECRET=' "$ENV_FILE"; then
                sed -i "s|^CALLS_JOIN_TOKEN_SECRET=.*|CALLS_JOIN_TOKEN_SECRET=${CALLS_JOIN_TOKEN_SECRET}|" "$ENV_FILE"
              else
                printf '\nCALLS_JOIN_TOKEN_SECRET=%s\n' "$CALLS_JOIN_TOKEN_SECRET" >> "$ENV_FILE"
              fi
              echo "[RU] CALLS_JOIN_TOKEN_SECRET synced to .env.production"
            else
              echo "[RU] WARNING: CALLS_JOIN_TOKEN_SECRET secret is not set in GitHub; runtime fallback may be used"
            fi

            if [ -n "${CALLS_WS_TRUSTED_PROXIES:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              touch "$ENV_FILE"
              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_WS_TRUSTED_PROXIES=' "$ENV_FILE"; then
                sed -i "s|^CALLS_WS_TRUSTED_PROXIES=.*|CALLS_WS_TRUSTED_PROXIES=${CALLS_WS_TRUSTED_PROXIES}|" "$ENV_FILE"
              else
                printf '\nCALLS_WS_TRUSTED_PROXIES=%s\n' "$CALLS_WS_TRUSTED_PROXIES" >> "$ENV_FILE"
              fi
              echo "[RU] CALLS_WS_TRUSTED_PROXIES synced to .env.production"
            else
              echo "[RU] WARNING: CALLS_WS_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${SFU_TRUSTED_PROXIES:-}" ]; then
              SFU_ENV_FILE="$APP_DIR/server/sfu/.env.production"
              mkdir -p "$APP_DIR/server/sfu"
              touch "$SFU_ENV_FILE"
              chmod 600 "$SFU_ENV_FILE" || true
              if grep -q '^SFU_TRUSTED_PROXIES=' "$SFU_ENV_FILE"; then
                sed -i "s|^SFU_TRUSTED_PROXIES=.*|SFU_TRUSTED_PROXIES=${SFU_TRUSTED_PROXIES}|" "$SFU_ENV_FILE"
              else
                printf '\nSFU_TRUSTED_PROXIES=%s\n' "$SFU_TRUSTED_PROXIES" >> "$SFU_ENV_FILE"
              fi
              echo "[RU] SFU_TRUSTED_PROXIES synced to server/sfu/.env.production"
            else
              echo "[RU] WARNING: SFU_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_URL:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_URL" "$VITE_SUPABASE_URL"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_URL" "$VITE_SUPABASE_URL"
              echo "[RU] SUPABASE_URL synced to .env.production"
            else
              echo "[RU] WARNING: VITE_SUPABASE_URL secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_PUBLISHABLE_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              echo "[RU] SUPABASE_ANON_KEY synced to .env.production"
            else
              echo "[RU] WARNING: VITE_SUPABASE_PUBLISHABLE_KEY secret is not set in GitHub"
            fi

            # -- 1.2 Ensure runtime deps are present -----------------------------
            # calls-ws imports ioredis at module load; if node_modules is stale
            # or missing, systemd restart will fail with ERR_MODULE_NOT_FOUND.
            if [ ! -f "$APP_DIR/node_modules/ioredis/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv-formats/package.json" ]; then
              echo "[RU] Installing production dependencies"
              npm ci --omit=dev --ignore-scripts
            fi

            # -- 1.5 Evict any stale calls-ws process holding port 8787 ---------
            # systemctl restart only kills its own PID; an old pm2/bare-node
            # process may still hold the port, causing EADDRINUSE on the new one.
            CALLS_WS_PORT="${CALLS_WS_PORT:-8787}"
            PIDS="$(ps -eo pid,args | awk '/[n]ode( |.* )server\/calls-ws\/index\.mjs/ {print $1}')"
            if [ -n "$PIDS" ]; then
              echo "$PIDS" | xargs -r kill -TERM || true
              sleep 1
              echo "$PIDS" | xargs -r kill -KILL || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${CALLS_WS_PORT}/tcp" 2>/dev/null || true
            fi
            sleep 1

            # -- 1.6 Evict any stale sfu process holding port 4443 ---------------
            SFU_PORT_VAL="${SFU_PORT:-4443}"
            SFU_PIDS="$(ps -eo pid,args | awk '/[n]ode( |.* )server\/sfu\/index\.mjs/ {print $1}')"
            if [ -n "$SFU_PIDS" ]; then
              echo "$SFU_PIDS" | xargs -r kill -TERM || true
              sleep 1
              echo "$SFU_PIDS" | xargs -r kill -KILL || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${SFU_PORT_VAL}/tcp" 2>/dev/null || true
            fi
            sleep 1

            # -- 2. Try to restart via Docker Compose ----------------------------
            _restart_docker() {
              local cmd="$1"
              if $cmd version >/dev/null 2>&1; then
                $cmd -f "$COMPOSE_FILE" up -d --build "$SERVICE"
                return 0
              fi
              return 1
            }

            if   _restart_docker "docker compose"        ; then echo "[RU] calls-ws restarted via docker compose"
            elif _restart_docker "docker-compose"        ; then echo "[RU] calls-ws restarted via docker-compose"
            elif _restart_docker "sudo docker compose"   ; then echo "[RU] calls-ws restarted via sudo docker compose"
            elif _restart_docker "sudo docker-compose"   ; then echo "[RU] calls-ws restarted via sudo docker-compose"

            # -- 3. Try PM2 -------------------------------------------------------
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 list | grep -q "$SERVICE"; then
                pm2 reload "$SERVICE" --update-env
                echo "[RU] calls-ws reloaded via pm2"
              else
                pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --env production
                pm2 save
                echo "[RU] calls-ws started via pm2 (first run)"
              fi
              if pm2 list | grep -q 'sfu'; then
                pm2 reload sfu --update-env
                echo "[RU] sfu reloaded via pm2"
              else
                pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --only sfu --env production 2>/dev/null || \
                  pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --env production 2>/dev/null || true
                pm2 save
                echo "[RU] sfu started via pm2"
              fi

            # -- 4. Try systemd --------------------------------------------------
            elif systemctl list-units --type=service | grep -q "$SERVICE"; then
              sudo systemctl restart "$SERVICE"
              sleep 3
              echo "[RU] calls-ws restarted via systemd"
              if systemctl list-units --type=service 2>/dev/null | grep -q 'sfu\.service'; then
                sudo systemctl restart sfu || true
                sleep 2
                echo "[RU] sfu restarted via systemd"
              else
                echo "[RU] sfu.service not installed — run bootstrap to set up"
              fi

            # -- 5. Bootstrap: install service from scratch ----------------------
            else
              echo "[RU] No runtime found -- running bootstrap"
              bash "$APP_DIR/infra/calls/bootstrap-sfu-node.sh" "$APP_DIR" "$REGION"
            fi

            # -- 6. Post-deploy diagnostics -------------------------------------
            echo "[RU] diagnostics: git/head + listeners + service + journal"
            git rev-parse --short HEAD || true
            ps -eo pid,user,args | grep -E '[n]ode( |.* )server/calls-ws/index\.mjs' || true
            ps -eo pid,user,args | grep -E '[n]ode( |.* )server/sfu/index\.mjs' || true
            ss -ltnp | grep -E ':8787|:4443' || true
            systemctl status "$SERVICE" --no-pager -l | sed -n '1,20p' || true
            systemctl status sfu --no-pager -l | sed -n '1,20p' 2>/dev/null || true
            journalctl -u "$SERVICE" -n 20 --no-pager || true
            journalctl -u sfu -n 20 --no-pager 2>/dev/null || true
            grep -n '^CALLS_JOIN_TOKEN_SECRET=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[RU] join token secret present in .env.production" || echo "[RU] join token secret missing in .env.production"
            grep -n '^CALLS_WS_TRUSTED_PROXIES=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[RU] trusted proxies present in .env.production" || echo "[RU] trusted proxies missing in .env.production"
            grep -n '^SFU_TRUSTED_PROXIES=' "$APP_DIR/server/sfu/.env.production" >/dev/null 2>&1 && echo "[RU] sfu trusted proxies present in server/sfu/.env.production" || echo "[RU] sfu trusted proxies missing in server/sfu/.env.production"
            grep -E '^SFU_ANNOUNCED_IP=.+' "$APP_DIR/server/sfu/.env.production" >/dev/null 2>&1 && echo "[RU] SFU_ANNOUNCED_IP is set" || echo "[RU] WARNING: SFU_ANNOUNCED_IP is empty — mediasoup ICE will fail!"
            echo "[RU] diagnostics: gateway code markers"
            grep -nE 'GATEWAY_DEFAULT_CODECS|ROOM_JOIN_OK|GET_ROUTER_RTP_CAPABILITIES|ROUTER_RTP_CAPABILITIES' "$APP_DIR/server/calls-ws/index.mjs" || true
            if command -v nginx >/dev/null 2>&1; then
              echo "[RU] diagnostics: nginx ws routing"
              nginx -T 2>/dev/null | grep -nE 'server_name|location /ws|proxy_pass|upstream|sfu-ru\.mansoni\.ru' | sed -n '1,220p' || true
            fi

  # ---------------------------------------------------------------------------
  # TR node
  # ---------------------------------------------------------------------------
  deploy-sfu-tr:
    name: Deploy SFU TR
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & bootstrap calls-ws on TR node
        uses: appleboy/ssh-action@v1.2.0
        env:
          CALLS_JOIN_TOKEN_SECRET: ${{ secrets.CALLS_JOIN_TOKEN_SECRET }}
          CALLS_WS_TRUSTED_PROXIES: ${{ secrets.CALLS_WS_TRUSTED_PROXIES }}
          SFU_TRUSTED_PROXIES: ${{ secrets.SFU_TRUSTED_PROXIES }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          host: ${{ secrets.SFU_TR_HOST }}
          port: ${{ secrets.SFU_TR_SSH_PORT || '22' }}
          username: ${{ secrets.SFU_TR_USER }}
          key: ${{ secrets.SFU_TR_SSH_KEY }}
          envs: CALLS_JOIN_TOKEN_SECRET,CALLS_WS_TRUSTED_PROXIES,SFU_TRUSTED_PROXIES,VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY
          script: |
            set -euo pipefail
            APP_DIR="${CALLS_APP_DIR:-/opt/mansoni/app}"
            COMPOSE_FILE="${CALLS_COMPOSE_FILE:-infra/calls/docker-compose.prod.yml}"
            SERVICE="${CALLS_SERVICE:-calls-ws}"
            REGION="tr"
            LOCK_FILE="${CALLS_DEPLOY_LOCK_FILE:-/tmp/calls-ws-deploy.lock}"
            exec 9>"$LOCK_FILE"
            flock 9

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"
            rm -f .git/index.lock .git/MERGE_HEAD .git/rebase-merge .git/rebase-apply || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            upsert_env_var() {
              local file="$1"
              local key="$2"
              local value="$3"
              touch "$file"
              chmod 600 "$file" || true
              if grep -q "^${key}=" "$file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$file"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$file"
              fi
            }

            if [ -n "${CALLS_JOIN_TOKEN_SECRET:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              touch "$ENV_FILE"
              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_JOIN_TOKEN_SECRET=' "$ENV_FILE"; then
                sed -i "s|^CALLS_JOIN_TOKEN_SECRET=.*|CALLS_JOIN_TOKEN_SECRET=${CALLS_JOIN_TOKEN_SECRET}|" "$ENV_FILE"
              else
                printf '\nCALLS_JOIN_TOKEN_SECRET=%s\n' "$CALLS_JOIN_TOKEN_SECRET" >> "$ENV_FILE"
              fi
            else
              echo "[TR] WARNING: CALLS_JOIN_TOKEN_SECRET secret is not set in GitHub"
            fi

            if [ -n "${CALLS_WS_TRUSTED_PROXIES:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              touch "$ENV_FILE"
              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_WS_TRUSTED_PROXIES=' "$ENV_FILE"; then
                sed -i "s|^CALLS_WS_TRUSTED_PROXIES=.*|CALLS_WS_TRUSTED_PROXIES=${CALLS_WS_TRUSTED_PROXIES}|" "$ENV_FILE"
              else
                printf '\nCALLS_WS_TRUSTED_PROXIES=%s\n' "$CALLS_WS_TRUSTED_PROXIES" >> "$ENV_FILE"
              fi
              echo "[TR] CALLS_WS_TRUSTED_PROXIES synced to .env.production"
            else
              echo "[TR] WARNING: CALLS_WS_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${SFU_TRUSTED_PROXIES:-}" ]; then
              SFU_ENV_FILE="$APP_DIR/server/sfu/.env.production"
              mkdir -p "$APP_DIR/server/sfu"
              touch "$SFU_ENV_FILE"
              chmod 600 "$SFU_ENV_FILE" || true
              if grep -q '^SFU_TRUSTED_PROXIES=' "$SFU_ENV_FILE"; then
                sed -i "s|^SFU_TRUSTED_PROXIES=.*|SFU_TRUSTED_PROXIES=${SFU_TRUSTED_PROXIES}|" "$SFU_ENV_FILE"
              else
                printf '\nSFU_TRUSTED_PROXIES=%s\n' "$SFU_TRUSTED_PROXIES" >> "$SFU_ENV_FILE"
              fi
              echo "[TR] SFU_TRUSTED_PROXIES synced to server/sfu/.env.production"
            else
              echo "[TR] WARNING: SFU_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_URL:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_URL" "$VITE_SUPABASE_URL"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_URL" "$VITE_SUPABASE_URL"
              echo "[TR] SUPABASE_URL synced to .env.production"
            else
              echo "[TR] WARNING: VITE_SUPABASE_URL secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_PUBLISHABLE_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              echo "[TR] SUPABASE_ANON_KEY synced to .env.production"
            else
              echo "[TR] WARNING: VITE_SUPABASE_PUBLISHABLE_KEY secret is not set in GitHub"
            fi

            if [ ! -f "$APP_DIR/node_modules/ioredis/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv-formats/package.json" ]; then
              echo "[TR] Installing production dependencies"
              npm ci --omit=dev --ignore-scripts
            fi

            CALLS_WS_PORT="${CALLS_WS_PORT:-8787}"
            PIDS="$(ps -eo pid,args | awk '/[n]ode( |.* )server\/calls-ws\/index\.mjs/ {print $1}')"
            if [ -n "$PIDS" ]; then
              echo "$PIDS" | xargs -r kill -TERM || true
              sleep 1
              echo "$PIDS" | xargs -r kill -KILL || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${CALLS_WS_PORT}/tcp" 2>/dev/null || true
            fi
            sleep 1

            _restart_docker() {
              local cmd="$1"
              if $cmd version >/dev/null 2>&1; then
                $cmd -f "$COMPOSE_FILE" up -d --build "$SERVICE"
                return 0
              fi
              return 1
            }

            if   _restart_docker "docker compose"        ; then echo "[TR] restarted via docker compose"
            elif _restart_docker "docker-compose"        ; then echo "[TR] restarted via docker-compose"
            elif _restart_docker "sudo docker compose"   ; then echo "[TR] restarted via sudo docker compose"
            elif _restart_docker "sudo docker-compose"   ; then echo "[TR] restarted via sudo docker-compose"
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 list | grep -q "$SERVICE"; then
                pm2 reload "$SERVICE" --update-env
                echo "[TR] reloaded via pm2"
              else
                pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --env production
                pm2 save
                echo "[TR] started via pm2 (first run)"
              fi
            elif systemctl list-units --type=service | grep -q "$SERVICE"; then
              sudo systemctl restart "$SERVICE"
              sleep 3
              echo "[TR] restarted via systemd"
            else
              echo "[TR] No runtime found -- running bootstrap"
              bash "$APP_DIR/infra/calls/bootstrap-sfu-node.sh" "$APP_DIR" "$REGION"
            fi

            echo "[TR] diagnostics: git/head + listeners + service + journal"
            git rev-parse --short HEAD || true
            ps -eo pid,user,args | grep -E '[n]ode( |.* )server/calls-ws/index\.mjs' || true
            ss -ltnp | grep ':8787' || true
            systemctl status "$SERVICE" --no-pager -l | sed -n '1,40p' || true
            journalctl -u "$SERVICE" -n 40 --no-pager || true
            grep -n '^CALLS_JOIN_TOKEN_SECRET=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[TR] join token secret present in .env.production" || echo "[TR] join token secret missing in .env.production"
            grep -n '^CALLS_WS_TRUSTED_PROXIES=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[TR] trusted proxies present in .env.production" || echo "[TR] trusted proxies missing in .env.production"
            grep -n '^SFU_TRUSTED_PROXIES=' "$APP_DIR/server/sfu/.env.production" >/dev/null 2>&1 && echo "[TR] sfu trusted proxies present in server/sfu/.env.production" || echo "[TR] sfu trusted proxies missing in server/sfu/.env.production"
            echo "[TR] diagnostics: gateway code markers"
            grep -nE 'GATEWAY_DEFAULT_CODECS|ROOM_JOIN_OK|GET_ROUTER_RTP_CAPABILITIES|ROUTER_RTP_CAPABILITIES' "$APP_DIR/server/calls-ws/index.mjs" || true
            if command -v nginx >/dev/null 2>&1; then
              echo "[TR] diagnostics: nginx ws routing"
              nginx -T 2>/dev/null | grep -nE 'server_name|location /ws|proxy_pass|upstream|sfu-tr\.mansoni\.ru' | sed -n '1,220p' || true
            fi

  # ---------------------------------------------------------------------------
  # AE node
  # ---------------------------------------------------------------------------
  deploy-sfu-ae:
    name: Deploy SFU AE
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & bootstrap calls-ws on AE node
        uses: appleboy/ssh-action@v1.2.0
        env:
          CALLS_JOIN_TOKEN_SECRET: ${{ secrets.CALLS_JOIN_TOKEN_SECRET }}
          CALLS_WS_TRUSTED_PROXIES: ${{ secrets.CALLS_WS_TRUSTED_PROXIES }}
          SFU_TRUSTED_PROXIES: ${{ secrets.SFU_TRUSTED_PROXIES }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          host: ${{ secrets.SFU_AE_HOST }}
          port: ${{ secrets.SFU_AE_SSH_PORT || '22' }}
          username: ${{ secrets.SFU_AE_USER }}
          key: ${{ secrets.SFU_AE_SSH_KEY }}
          envs: CALLS_JOIN_TOKEN_SECRET,CALLS_WS_TRUSTED_PROXIES,SFU_TRUSTED_PROXIES,VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY
          script: |
            set -euo pipefail
            APP_DIR="${CALLS_APP_DIR:-/opt/mansoni/app}"
            COMPOSE_FILE="${CALLS_COMPOSE_FILE:-infra/calls/docker-compose.prod.yml}"
            SERVICE="${CALLS_SERVICE:-calls-ws}"
            REGION="ae"
            LOCK_FILE="${CALLS_DEPLOY_LOCK_FILE:-/tmp/calls-ws-deploy.lock}"
            exec 9>"$LOCK_FILE"
            flock 9

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

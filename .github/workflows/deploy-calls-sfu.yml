              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_JOIN_TOKEN_SECRET=' "$ENV_FILE"; then
                sed -i "s|^CALLS_JOIN_TOKEN_SECRET=.*|CALLS_JOIN_TOKEN_SECRET=${CALLS_JOIN_TOKEN_SECRET}|" "$ENV_FILE"
              else
                printf '\nCALLS_JOIN_TOKEN_SECRET=%s\n' "$CALLS_JOIN_TOKEN_SECRET" >> "$ENV_FILE"
              fi
            else
              echo "[AE] WARNING: CALLS_JOIN_TOKEN_SECRET secret is not set in GitHub"
            fi

            if [ -n "${CALLS_WS_TRUSTED_PROXIES:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              touch "$ENV_FILE"
              chmod 600 "$ENV_FILE" || true
              if grep -q '^CALLS_WS_TRUSTED_PROXIES=' "$ENV_FILE"; then
                sed -i "s|^CALLS_WS_TRUSTED_PROXIES=.*|CALLS_WS_TRUSTED_PROXIES=${CALLS_WS_TRUSTED_PROXIES}|" "$ENV_FILE"
              else
                printf '\nCALLS_WS_TRUSTED_PROXIES=%s\n' "$CALLS_WS_TRUSTED_PROXIES" >> "$ENV_FILE"
              fi
              echo "[AE] CALLS_WS_TRUSTED_PROXIES synced to .env.production"
            else
              echo "[AE] WARNING: CALLS_WS_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${SFU_TRUSTED_PROXIES:-}" ]; then
              SFU_ENV_FILE="$APP_DIR/server/sfu/.env.production"
              mkdir -p "$APP_DIR/server/sfu"
              touch "$SFU_ENV_FILE"
              chmod 600 "$SFU_ENV_FILE" || true
              if grep -q '^SFU_TRUSTED_PROXIES=' "$SFU_ENV_FILE"; then
                sed -i "s|^SFU_TRUSTED_PROXIES=.*|SFU_TRUSTED_PROXIES=${SFU_TRUSTED_PROXIES}|" "$SFU_ENV_FILE"
              else
                printf '\nSFU_TRUSTED_PROXIES=%s\n' "$SFU_TRUSTED_PROXIES" >> "$SFU_ENV_FILE"
              fi
              echo "[AE] SFU_TRUSTED_PROXIES synced to server/sfu/.env.production"
            else
              echo "[AE] WARNING: SFU_TRUSTED_PROXIES secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_URL:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_URL" "$VITE_SUPABASE_URL"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_URL" "$VITE_SUPABASE_URL"
              echo "[AE] SUPABASE_URL synced to .env.production"
            else
              echo "[AE] WARNING: VITE_SUPABASE_URL secret is not set in GitHub"
            fi

            if [ -n "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
              ENV_FILE="$APP_DIR/.env.production"
              upsert_env_var "$ENV_FILE" "SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_PUBLISHABLE_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              upsert_env_var "$ENV_FILE" "VITE_SUPABASE_ANON_KEY" "$VITE_SUPABASE_PUBLISHABLE_KEY"
              echo "[AE] SUPABASE_ANON_KEY synced to .env.production"
            else
              echo "[AE] WARNING: VITE_SUPABASE_PUBLISHABLE_KEY secret is not set in GitHub"
            fi

            if [ ! -f "$APP_DIR/node_modules/ioredis/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv-formats/package.json" ]; then
              echo "[AE] Installing production dependencies"
              npm ci --omit=dev --ignore-scripts
            fi

            CALLS_WS_PORT="${CALLS_WS_PORT:-8787}"
            PIDS="$(ps -eo pid,args | awk '/[n]ode( |.* )server\/calls-ws\/index\.mjs/ {print $1}')"
            if [ -n "$PIDS" ]; then
              echo "$PIDS" | xargs -r kill -TERM || true
              sleep 1
              echo "$PIDS" | xargs -r kill -KILL || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${CALLS_WS_PORT}/tcp" 2>/dev/null || true
            fi
            sleep 1

            _restart_docker() {
              local cmd="$1"
              if $cmd version >/dev/null 2>&1; then
                $cmd -f "$COMPOSE_FILE" up -d --build "$SERVICE"
                return 0
              fi
              return 1
            }

            if   _restart_docker "docker compose"        ; then echo "[AE] restarted via docker compose"
            elif _restart_docker "docker-compose"        ; then echo "[AE] restarted via docker-compose"
            elif _restart_docker "sudo docker compose"   ; then echo "[AE] restarted via sudo docker compose"
            elif _restart_docker "sudo docker-compose"   ; then echo "[AE] restarted via sudo docker-compose"
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 list | grep -q "$SERVICE"; then
                pm2 reload "$SERVICE" --update-env
                echo "[AE] reloaded via pm2"
              else
                pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --env production
                pm2 save
                echo "[AE] started via pm2 (first run)"
              fi
            elif systemctl list-units --type=service | grep -q "$SERVICE"; then
              sudo systemctl restart "$SERVICE"
              sleep 3
              echo "[AE] restarted via systemd"
            else
              echo "[AE] No runtime found -- running bootstrap"
              bash "$APP_DIR/infra/calls/bootstrap-sfu-node.sh" "$APP_DIR" "$REGION"
            fi

            echo "[AE] diagnostics: git/head + listeners + service + journal"
            git rev-parse --short HEAD || true
            ps -eo pid,user,args | grep -E '[n]ode( |.* )server/calls-ws/index\.mjs' || true
            ss -ltnp | grep ':8787' || true
            systemctl status "$SERVICE" --no-pager -l | sed -n '1,40p' || true
            journalctl -u "$SERVICE" -n 40 --no-pager || true
            grep -n '^CALLS_JOIN_TOKEN_SECRET=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[AE] join token secret present in .env.production" || echo "[AE] join token secret missing in .env.production"
            grep -n '^CALLS_WS_TRUSTED_PROXIES=' "$APP_DIR/.env.production" >/dev/null 2>&1 && echo "[AE] trusted proxies present in .env.production" || echo "[AE] trusted proxies missing in .env.production"
            grep -n '^SFU_TRUSTED_PROXIES=' "$APP_DIR/server/sfu/.env.production" >/dev/null 2>&1 && echo "[AE] sfu trusted proxies present in server/sfu/.env.production" || echo "[AE] sfu trusted proxies missing in server/sfu/.env.production"
            echo "[AE] diagnostics: gateway code markers"
            grep -nE 'GATEWAY_DEFAULT_CODECS|ROOM_JOIN_OK|GET_ROUTER_RTP_CAPABILITIES|ROUTER_RTP_CAPABILITIES' "$APP_DIR/server/calls-ws/index.mjs" || true
            if command -v nginx >/dev/null 2>&1; then
              echo "[AE] diagnostics: nginx ws routing"
              nginx -T 2>/dev/null | grep -nE 'server_name|location /ws|proxy_pass|upstream|sfu-ae\.mansoni\.ru' | sed -n '1,220p' || true
            fi

  # ---------------------------------------------------------------------------
  # Readiness verification -- runs even if region deploys soft-failed
  # ---------------------------------------------------------------------------
  verify-sfu:
    name: Verify SFU endpoints
    runs-on: ubuntu-latest
    needs:
      - deploy-sfu-ru
      - deploy-sfu-tr
      - deploy-sfu-ae
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required deploy secrets
        env:
          CALLS_JOIN_TOKEN_SECRET: ${{ secrets.CALLS_JOIN_TOKEN_SECRET }}
          CALLS_WS_TRUSTED_PROXIES: ${{ secrets.CALLS_WS_TRUSTED_PROXIES }}
          SFU_TRUSTED_PROXIES: ${{ secrets.SFU_TRUSTED_PROXIES }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in CALLS_JOIN_TOKEN_SECRET CALLS_WS_TRUSTED_PROXIES SFU_TRUSTED_PROXIES VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY SUPABASE_SERVICE_ROLE_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "[verify-sfu] missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "[verify-sfu] one or more required deploy secrets are missing"
            exit 1
          fi

      - name: Security policy smoke (calls-ws)
        run: npm run test -- src/test/calls-ws-e2ee-caps-policy.test.ts

      - name: Build readiness endpoint list
        run: |
          set -euo pipefail
          endpoints="wss://sfu-ru.mansoni.ru/ws"
          if [ "${{ needs.deploy-sfu-tr.result }}" != "skipped" ]; then
            endpoints="$endpoints,wss://sfu-tr.mansoni.ru/ws"
          fi
          if [ "${{ needs.deploy-sfu-ae.result }}" != "skipped" ]; then
            endpoints="$endpoints,wss://sfu-ae.mansoni.ru/ws"
          fi
          echo "CALLS_SMOKE_ENDPOINTS=$endpoints" >> "$GITHUB_ENV"
          echo "[verify-sfu] endpoints=$endpoints"

      - name: Readiness probe (deployed regions)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run calls:sfu:readiness
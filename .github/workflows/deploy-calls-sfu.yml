            if [ ! -f "$APP_DIR/node_modules/ioredis/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv/package.json" ] || [ ! -f "$APP_DIR/node_modules/ajv-formats/package.json" ]; then
              echo "[TR] Installing production dependencies"
              npm ci --omit=dev --ignore-scripts
            fi

            CALLS_WS_PORT="${CALLS_WS_PORT:-8787}"
            PIDS="$(ps -eo pid,args | awk '/[n]ode( |.* )server\/calls-ws\/index\.mjs/ {print $1}')"
            if [ -n "$PIDS" ]; then
              echo "$PIDS" | xargs -r kill -TERM || true
              sleep 1
              echo "$PIDS" | xargs -r kill -KILL || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${CALLS_WS_PORT}/tcp" 2>/dev/null || true
            fi
            sleep 1

            _restart_docker() {
              local cmd="$1"
              if $cmd version >/dev/null 2>&1; then
                $cmd -f "$COMPOSE_FILE" up -d --build "$SERVICE"
                return 0
              fi
              return 1
            }

            if   _restart_docker "docker compose"        ; then echo "[TR] restarted via docker compose"
            elif _restart_docker "docker-compose"        ; then echo "[TR] restarted via docker-compose"
            elif _restart_docker "sudo docker compose"   ; then echo "[TR] restarted via sudo docker compose"
            elif _restart_docker "sudo docker-compose"   ; then echo "[TR] restarted via sudo docker-compose"
            elif command -v pm2 >/dev/null 2>&1; then
              if pm2 list | grep -q "$SERVICE"; then
                pm2 reload "$SERVICE" --update-env
                echo "[TR] reloaded via pm2"
              else
                pm2 start "$APP_DIR/infra/calls/pm2.config.cjs" --env production
                pm2 save
                echo "[TR] started via pm2 (first run)"
              fi
            elif systemctl list-units --type=service | grep -q "$SERVICE"; then
              sudo systemctl restart "$SERVICE"
              sleep 3
              echo "[TR] restarted via systemd"
            else
              echo "[TR] No runtime found -- running bootstrap"
              bash "$APP_DIR/infra/calls/bootstrap-sfu-node.sh" "$APP_DIR" "$REGION"
            fi

            echo "[TR] diagnostics: git/head + listeners + service + journal"
            git rev-parse --short HEAD || true
            ps -eo pid,user,args | grep -E '[n]ode( |.* )server/calls-ws/index\.mjs' || true
            ss -ltnp | grep ':8787' || true
            systemctl status "$SERVICE" --no-pager -l | sed -n '1,40p' || true
            journalctl -u "$SERVICE" -n 40 --no-pager || true
            echo "[TR] diagnostics: gateway code markers"
            grep -nE 'GATEWAY_DEFAULT_CODECS|ROOM_JOIN_OK|GET_ROUTER_RTP_CAPABILITIES|ROUTER_RTP_CAPABILITIES' "$APP_DIR/server/calls-ws/index.mjs" || true
            if command -v nginx >/dev/null 2>&1; then
              echo "[TR] diagnostics: nginx ws routing"
              nginx -T 2>/dev/null | grep -nE 'server_name|location /ws|proxy_pass|upstream|sfu-tr\.mansoni\.ru' | sed -n '1,220p' || true
            fi


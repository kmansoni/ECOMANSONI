            fi

  # ---------------------------------------------------------------------------
  # Readiness verification -- runs even if region deploys soft-failed
  # ---------------------------------------------------------------------------
  verify-sfu:
    name: Verify SFU endpoints
    runs-on: ubuntu-latest
    needs:
      - deploy-sfu-ru
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Readiness probe (RU/TR/AE)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CALLS_SMOKE_ENDPOINTS: wss://sfu-ru.mansoni.ru/ws
        run: npm run calls:sfu:readiness
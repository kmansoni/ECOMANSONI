  # TR node
  # ---------------------------------------------------------------------------
  deploy-sfu-tr:
    name: Deploy SFU TR
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy & bootstrap calls-ws on TR node

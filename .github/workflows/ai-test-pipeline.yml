# AI-Enhanced Test Pipeline with Security Integration
name: AI Security Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Weekly security scan on Monday

env:
  NODE_VERSION: '18'
  AI_SECURITY_FAIL_ON: 'high'
  PROMPTFOO_CONCURRENCY: '5'

jobs:
  # ========================================
  # 1. AI Security Scanning (Agentic Security)
  # ========================================
  ai-security-scan:
    name: AI Security Vulnerability Scan
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities: ${{ steps.scan.outputs.vulnerabilities }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Agentic Security Scan
        id: scan
        run: |
          npx agentic-security scan \
            --all \
            --owasp-top10 \
            --zero-day \
            --fail-on=${{ env.AI_SECURITY_FAIL_ON }} \
            --format=json \
            --output=security-report.json || true
          
          # Extract vulnerability count
          VULN_COUNT=$(cat security-report.json | jq '.vulnerabilities | length' || echo "0")
          echo "vulnerabilities=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          # Fail if high/critical vulnerabilities found
          CRITICAL_COUNT=$(cat security-report.json | jq '[.vulnerabilities[] | select(.severity=="critical" or .severity=="high")] | length' || echo "0")
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error ::Found $CRITICAL_COUNT critical/high severity vulnerabilities"
            exit 1
          fi

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report-${{ github.sha }}
          path: security-report.json

      - name: Comment PR with Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('security-report.json', 'utf8'));
            const vulnCount = report.vulnerabilities.length;
            
            let comment = `## 🔒 AI Security Scan Results\n\n`;
            comment += `| Severity | Count |\n`;
            comment += `|---------|-------|\n`;
            
            ['critical', 'high', 'medium', 'low', 'info'].forEach(sev => {
              const count = report.vulnerabilities.filter(v => v.severity === sev).length;
              comment += `| ${sev.toUpperCase()} | ${count} |\n`;
            });
            
            comment += `\n**Total Vulnerabilities:** ${vulnCount}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ========================================
  # 2. LLM Feature Testing (promptfoo)
  # ========================================
  llm-feature-tests:
    name: LLM Feature Validation
    runs-on: ubuntu-latest
    needs: ai-security-scan
    if: needs.ai-security-scan.result == 'success'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure LLM Provider
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Run promptfoo Tests
        id: promptfoo
        run: |
          npx promptfoo run \
            --config tests/ai-features/promptfoo.yaml \
            --max-concurrency ${{ env.PROMPTFOO_CONCURRENCY }} \
            --output tests/ai-features/results.json || true
          
          # Extract results
          PASSED=$(cat tests/ai-features/results.json | jq '[.evaluations[] | select(.passing)] | length' || echo "0")
          FAILED=$(cat tests/ai-features/results.json | jq '[.evaluations[] | select(.passing==false)] | length' || echo "0")
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning ::$FAILED LLM tests failed"
          fi

      - name: Upload promptfoo Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptfoo-results-${{ github.sha }}
          path: tests/ai-features/results.json

   # ========================================
   # 3. AI-Generated Test Execution
   # ========================================
   ai-test-generation:
     name: AI Test Generation & Execution
     runs-on: ubuntu-latest
     needs: [ai-security-scan, llm-feature-tests]
     if: needs.llm-feature-tests.result == 'success' || needs.llm-feature-tests.result == 'skipped'
     
     strategy:
       matrix:
         domain: [messenger, instagram, navigator, shop, taxi, insurance, calls]
     
     steps:
       - name: Checkout Code
         uses: actions/checkout@v4

       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: ${{ env.NODE_VERSION }}
           cache: 'npm'

       - name: Install Dependencies
         run: npm ci

       - name: Generate Tests with AI Suite
         run: |
           npx ai-testing-suite generate \
             --domain ${{ matrix.domain }} \
             --output tests/generated/${{ matrix.domain }} \
             --analyze-codebase || true

       - name: Run Generated Tests
         id: ai-tests
         run: |
           npm test -- ${{ matrix.domain }} --testPathPattern=generated || true
           
           # Extract coverage
           COVERAGE=$(cat coverage/${{ matrix.domain }}/coverage-summary.json | jq '.total.lines.pct' || echo "0")
           echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

       - name: Upload Generated Tests
         uses: actions/upload-artifact@v4
         with:
           name: generated-tests-${{ matrix.domain }}-${{ github.sha }}
           path: tests/generated/${{ matrix.domain }}

   # ========================================
   # 4. Extended Test Suite (New Tests)
   # ========================================
   extended-messenger-tests:
     name: Extended Messenger Tests (New)
     runs-on: ubuntu-latest
     needs: [ai-security-scan]  # must pass security baseline
     if: needs.ai-security-scan.result == 'success'
     
     steps:
       - name: Checkout Code
         uses: actions/checkout@v4

       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: ${{ env.NODE_VERSION }}
           cache: 'npm'

       - name: Install Dependencies
         run: npm ci

       - name: Run Extended Messenger Tests
         run: |
           # New unit/integration tests
           npm test -- messenger --testPathPattern="(e2ee-crypto-agility|chat-network-resilience|chat-content-moderation|chat-gdpr-compliance|chat-i18n|chat-storage-quotas|chat-time-edge-cases|chat-battery-impact|chat-feature-flags)" || true

           # E2E tests (a11y, cross-platform)
           npx playwright test e2e/chat-a11y.spec.ts --reporter=json --output=e2e-a11y-report.json || true
           npx playwright test e2e/chat-cross-platform.spec.ts --reporter=json --output=e2e-cross-platform-report.json || true

       - name: Upload Extended Test Reports
         uses: actions/upload-artifact@v4
         if: always()
         with:
           name: extended-test-reports-${{ github.sha }}
           path: |
             e2e-a11y-report.json
             e2e-cross-platform-report.json

   # ========================================
   # 5. MicroVM Security Testing
   # ========================================
   microvm-security:
     name: Firecracker MicroVM Security
     runs-on: ubuntu-latest
     needs: ai-security-scan
     if: needs.ai-security-scan.result == 'success'
     
     container:
       image: firecracker-microvm:latest
       options: >-
         --network none
         --cap-drop ALL
         --security-opt no-new-privileges=true
         --security-opt seccomp=strict.json
         --pids-limit 64:64
         --memory 512m
         --read-only
         --tmpfs /tmp:rw,size=100m,noexec,nosuid

     steps:
       - name: Checkout Code
         uses: actions/checkout@v4

       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: ${{ env.NODE_VERSION }}
           cache: 'npm'

       - name: Install Dependencies
         run: npm ci

       - name: Run Tests in Isolated Environment
         run: |
           npm test -- --testPathPattern='(messenger|instagram|navigator)'
           echo "Tests completed in secure MicroVM"

       - name: Verify No Network Access
         run: |
           if ping -c 1 8.8.8.8 2>/dev/null; then
             echo "::error ::Network access detected - MicroVM isolation failed!"
             exit 1
           else
             echo "✓ MicroVM network isolation verified"
           fi

  # ========================================
  # 5. Performance Regression Testing
  # ========================================
  performance-tests:
    name: AI Performance Regression
    runs-on: ubuntu-latest
    needs: [ai-test-generation, microvm-security]
    if: always()
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run k6 Load Tests
        run: |
          k6 run tests/load/messenger-chat.js --out json=load-results.json
          k6 run tests/load/instagram-feed.js --out json=load-results.json

      - name: Analyze Performance
        run: |
          node scripts/analyze-performance.js load-results.json

  # ========================================
  # 6. Security Summary
  # ========================================
  security-summary:
    name: Security & Quality Summary
    runs-on: ubuntu-latest
    needs: 
      - ai-security-scan
      - llm-feature-tests
      - ai-test-generation
      - microvm-security
      - performance-tests
    if: always()
    
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate Summary
        run: |
          node scripts/generate-security-summary.js reports/

      - name: Create GitHub Release Notes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ github.sha }}"
          body_path: security-summary.md
          files: |
            reports/**/*.json
            security-summary.md

name: Deploy Mansoni → mansoni.ru

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-mansoni
  cancel-in-progress: false   # никогда не отменять деплой на лету

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    outputs:
      artifact-name: dist-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Calls env probe (prod-grade gate)
        run: npm run calls:env:probe
        env:
          REQUIRE_CALLS_ENV_PROBE: "1"
          VITE_CALLS_V2_ENABLED: ${{ vars.VITE_CALLS_V2_ENABLED }}
          VITE_CALLS_V2_WS_URL: ${{ vars.VITE_CALLS_V2_WS_URL }}
          VITE_CALLS_V2_WS_URLS: ${{ vars.VITE_CALLS_V2_WS_URLS }}
          VITE_CALLS_V2_REKEY_INTERVAL_MS: ${{ vars.VITE_CALLS_V2_REKEY_INTERVAL_MS }}
          VITE_TURN_CREDENTIALS_URL: ${{ vars.VITE_TURN_CREDENTIALS_URL }}

      - name: Lint (warnings allowed)
        run: npm run lint -- --max-warnings=9999

      - name: Backend safety (migrations)
        run: npm run check:backend

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_CALLS_V2_ENABLED: ${{ vars.VITE_CALLS_V2_ENABLED }}
          VITE_CALLS_V2_WS_URL: ${{ vars.VITE_CALLS_V2_WS_URL }}
          VITE_CALLS_V2_WS_URLS: ${{ vars.VITE_CALLS_V2_WS_URLS }}
          VITE_CALLS_V2_REKEY_INTERVAL_MS: ${{ vars.VITE_CALLS_V2_REKEY_INTERVAL_MS }}
          VITE_CALLS_FRAME_E2EE_ADVERTISE_SFRAME: ${{ vars.VITE_CALLS_FRAME_E2EE_ADVERTISE_SFRAME }}
          VITE_TURN_CREDENTIALS_URL: ${{ vars.VITE_TURN_CREDENTIALS_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.VITE_EXPECTED_SUPABASE_PROJECT_REF }}
          REQUIRE_CHAT_SCHEMA_PROBE: "1"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CHAT_SCHEMA_EXPECTED_VERSION: "2"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # 2. SUPABASE (migrations + edge functions)
  # ─────────────────────────────────────────────
  supabase:
    name: Supabase deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase (migrations + functions)
        shell: pwsh
        run: |
          scripts/supabase-deploy.ps1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.VITE_EXPECTED_SUPABASE_PROJECT_REF }}

  # ─────────────────────────────────────────────
  # 3. DEPLOY FRONTEND → VPS mansoni.ru
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → mansoni.ru
    runs-on: ubuntu-latest
    needs: [build, supabase]
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: SCP dist → VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ADMINVPS_HOST }}
          username: ${{ secrets.ADMINVPS_USER }}
          key: ${{ secrets.ADMINVPS_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "${{ secrets.ADMINVPS_APP_DIR }}/dist/"
          strip_components: 1

      - name: Write .env.production on VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.ADMINVPS_HOST }}
          username: ${{ secrets.ADMINVPS_USER }}
          key: ${{ secrets.ADMINVPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            ENV_FILE="${{ secrets.ADMINVPS_APP_DIR }}/.env.production"
            cat > "$ENV_FILE" <<'ENVEOF'
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_API_KEY=${{ secrets.VITE_API_KEY }}
            VITE_CALLS_V2_ENABLED=${{ vars.VITE_CALLS_V2_ENABLED }}
            VITE_CALLS_V2_WS_URL=${{ vars.VITE_CALLS_V2_WS_URL }}
            VITE_CALLS_V2_WS_URLS=${{ vars.VITE_CALLS_V2_WS_URLS }}
            VITE_CALLS_V2_REKEY_INTERVAL_MS=${{ vars.VITE_CALLS_V2_REKEY_INTERVAL_MS }}
            VITE_CALLS_FRAME_E2EE_ADVERTISE_SFRAME=${{ vars.VITE_CALLS_FRAME_E2EE_ADVERTISE_SFRAME }}
            VITE_TURN_CREDENTIALS_URL=${{ vars.VITE_TURN_CREDENTIALS_URL }}
            ENVEOF
            chmod 600 "$ENV_FILE"

      - name: Reload nginx (zero-downtime)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.ADMINVPS_HOST }}
          username: ${{ secrets.ADMINVPS_USER }}
          key: ${{ secrets.ADMINVPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            sudo nginx -t
            sudo systemctl reload nginx

      - name: Smoke test mansoni.ru
        run: |
          sleep 5
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 https://mansoni.ru/)
          echo "HTTP status: $HTTP"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "301" ] && [ "$HTTP" != "302" ]; then
            echo "::error::mansoni.ru returned $HTTP — deployment may have failed"
            exit 1
          fi

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512" role="img" aria-label="Mansoni">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="mBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="200" height="200" rx="46" ry="46" fill="url(#mBg)"/>

  <!-- Монограмма M: геометричная, заливка градиентом -->
  <path fill="url(#mGrad)" d="
    M 44 154
    L 44 46
    L 64 46
    L 100 108
    L 136 46
    L 156 46
    L 156 154
    L 138 154
    L 138 84
    L 108 132
    L 92 132
    L 62 84
    L 62 154
    Z
  "/>

  <!-- Акцент-точка -->
  <circle cx="100" cy="166" r="5" fill="#22D3EE"/>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="512" height="512" role="img" aria-label="Mansoni">
  <defs>
    <linearGradient id="mansoniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="mansoniGradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="mansoniGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Фоновый скруглённый квадрат -->
  <rect x="4" y="4" width="192" height="192" rx="44" ry="44" fill="#0B1020"/>
  <rect x="4" y="4" width="192" height="192" rx="44" ry="44" fill="url(#mansoniGradSoft)"/>

  <!-- Монограмма M: две диагонали + внешние стойки, минимализм/геометрия -->
  <g fill="none" stroke="url(#mansoniGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#mansoniGlow)">
    <!-- Левая стойка -->
    <path d="M52 148 L52 60"/>
    <!-- Правая стойка -->
    <path d="M148 148 L148 60"/>
    <!-- Диагонали, сходящиеся в центре -->
    <path d="M52 60 L100 118 L148 60"/>
  </g>

  <!-- Акцентная точка в вершине -->
  <circle cx="100" cy="118" r="6" fill="#06B6D4"/>
</svg>
